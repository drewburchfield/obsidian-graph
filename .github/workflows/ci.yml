name: CI

# Every job installs Aikido safe-chain before running uv sync so dependency
# installs are checked against Aikido Intel's malware feed. Version pinned in
# the install step. The pip-shim assertion after install confirms the wrapper
# is actually intercepting pip: if it ever silently falls back to unprotected
# pip (PATH mis-ordering, shim not on disk), CI fails loudly.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Workflow-wide default. Jobs only need read access; a future job that needs
# more (e.g. release publishing) should opt in at the job level.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # safe-chain version is pinned: a future regression should not silently
      # break the build. Bump deliberately when a known-good newer version exists.
      - name: Install safe-chain
        run: |
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci
          echo "$HOME/.safe-chain/shims" >> "$GITHUB_PATH"
          echo "$HOME/.safe-chain/bin"   >> "$GITHUB_PATH"

      # Confirms the pip wrapper is active. Without this, a broken install
      # falls back to unprotected pip and CI still passes (silent bypass).
      - name: Verify safe-chain is wrapping pip
        run: |
          safe-chain --version
          case "$(command -v pip)" in "$HOME"/.safe-chain/shims/*) echo "ok: $(command -v pip)";; *) echo "safe-chain pip shim not on PATH" >&2; exit 1;; esac

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"

      - name: Sync dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Run ruff
        run: uv run ruff check src/ tests/ scripts/

      - name: Run black (check only)
        run: uv run black --check src/ tests/ scripts/

      - name: Run mypy
        run: uv run mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: obsidian
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: obsidian_graph
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safe-chain
        run: |
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci
          echo "$HOME/.safe-chain/shims" >> "$GITHUB_PATH"
          echo "$HOME/.safe-chain/bin"   >> "$GITHUB_PATH"

      - name: Verify safe-chain is wrapping pip
        run: |
          safe-chain --version
          case "$(command -v pip)" in "$HOME"/.safe-chain/shims/*) echo "ok: $(command -v pip)";; *) echo "safe-chain pip shim not on PATH" >&2; exit 1;; esac

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"

      - name: Sync dependencies (with dev extras)
        run: uv sync --frozen --extra dev

      - name: Initialize database schema
        env:
          PGPASSWORD: testpassword
        run: psql -h localhost -U obsidian -d obsidian_graph -f src/schema.sql

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: obsidian
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: obsidian_graph
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: uv run pytest tests/ -v -m "not e2e" --ignore=tests/test_e2e.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safe-chain
        run: |
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci
          echo "$HOME/.safe-chain/shims" >> "$GITHUB_PATH"
          echo "$HOME/.safe-chain/bin"   >> "$GITHUB_PATH"

      - name: Verify safe-chain is wrapping pip
        run: |
          safe-chain --version
          case "$(command -v pip)" in "$HOME"/.safe-chain/shims/*) echo "ok: $(command -v pip)";; *) echo "safe-chain pip shim not on PATH" >&2; exit 1;; esac

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: bandit -r src/ -ll

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t obsidian-graph .

      - name: Verify image runs
        run: |
          docker run --rm obsidian-graph .venv/bin/python -c "from src.server import app; print('Import successful')"
